; ============================================================
; Green Home – P485 Modified Firmware
; Célkártya: P485 ESP32-D0WD-V3 (eredeti Greenhess kártya)
; Eredeti backup: P485_backup_full_4MB.bin – SOHA NEM MÓDOSÍTJUK!
; ============================================================

[env:p485]
platform  = espressif32
board     = esp32dev
framework = arduino

; ---- Partíció / Flash ----
board_build.partitions = partitions_custom.csv
board_build.filesystem = littlefs
board_upload.flash_size = 4MB

; ---- Fordítás ----
build_flags =
    -DCORE_DEBUG_LEVEL=0

    ; Verzió
    -DFW_VERSION='"1.0.6"'
    -DFW_PRODUCT='"P485-GH"'
    -DFW_BRAND='"Green Home"'

    ; P485 MAC – Modbus kliens ID és topic alap
    -DP485_MAC='"84_1F_E8_15_B7_7C"'

    ; A mi publikus brokerünk (Pentasun eltávolítva)
    -DGH_MQTT_HOST='"test.mosquitto.org"'
    -DGH_MQTT_PORT=1883

    ; RS485 pinout (P485 eredeti – azonos green_home_firmware-rel)
    -DRS485_TX=17
    -DRS485_RX=16
    -DRS485_DE=4

    ; LED / Gomb
    -DLED_STATUS=2
    -DBUTTON_PIN=0
    -DBUTTON_LONG_MS=5000

    ; LittleFS
    -DLFS_CONFIG_PATH='"/config/settings.json"'
    -DLFS_LOG_PATH='"/log/events.json"'

    ; Modbus (Deye inverter)
    -DMODBUS_SLAVE_ID=1
    -DMODBUS_BAUD=9600

    ; Heartbeat interval
    -DHB_INTERVAL_MS=10000

    ; Web szerver
    -DWEB_PORT=80
    -DMDNS_HOSTNAME='"p485"'

    ; OTA (GitHub Releases URL-t állítsd be a .bin feltöltés után)
    -DOTA_VERSION_URL='""'
    -DOTA_FIRMWARE_URL='""'

    ; Serial
    -DSERIAL_BAUD=115200

; ---- OTA WiFi ----
upload_protocol = espota
upload_port = 192.168.8.32
upload_flags =
    --auth=green2026

; ---- Könyvtárak ----
lib_deps =
    me-no-dev/ESPAsyncWebServer @ ^1.2.4
    me-no-dev/AsyncTCP @ ^1.1.1
    heman/AsyncMqttClient-esphome @ ^2.1.0
    bblanchon/ArduinoJson @ ^7.0.0
    tzapu/WiFiManager @ ^2.0.17

upload_speed   = 115200
monitor_speed  = 115200
monitor_filters = esp32_exception_decoder, default
